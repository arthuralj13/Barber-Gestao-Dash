<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black Bil — Meus Agendamentos</title>
    <link rel="stylesheet" href="meus-agendamentos.css">
    <link href="https://fonts.googleapis.com/css2?family=Righteous&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <div class="titulo"><h1>Black Bil</h1></div>
        <div class="logo"><img src="../../src/logo.jpg" alt="Logo Black Bil"></div>

        <div class="usuario-wrapper" id="usuario-wrapper">
            <button class="btn-usuario" id="btn-usuario" aria-label="Conta">
                <span class="usuario-inicial" id="usuario-inicial"></span>
            </button>
            <div class="usuario-dropdown escondido" id="usuario-dropdown">
                <div class="dropdown-usuario-nome" id="dropdown-nome"></div>
                <a class="dropdown-item" href="../agendamento/agendamento.html">
                    <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                        <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
                        <line x1="3" y1="10" x2="21" y2="10"/>
                    </svg>
                    Novo agendamento
                </a>
                <button class="dropdown-item dropdown-sair" id="btn-sair" type="button">
                    <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                        <polyline points="16 17 21 12 16 7"/>
                        <line x1="21" y1="12" x2="9" y2="12"/>
                    </svg>
                    Sair
                </button>
            </div>
        </div>
    </header>

    <main class="container">

        <div class="page-header">
            <a class="btn-voltar-pg" href="../agendamento/agendamento.html">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 18 9 12 15 6"/>
                </svg>
                Voltar
            </a>
            <h2 class="page-titulo">Meus agendamentos</h2>
        </div>

        <div class="filtros" id="filtros">
            <button class="filtro ativo" data-filtro="todos">Todos</button>
            <button class="filtro" data-filtro="confirmado">Confirmados</button>
            <button class="filtro" data-filtro="concluido">Concluídos</button>
            <button class="filtro" data-filtro="cancelado">Cancelados</button>
        </div>

        <div class="lista-agendamentos" id="lista-agendamentos"></div>

    </main>

    <script src="meus-agendamentos.js"></script>
</body>
</html>
