<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black Bil — Agenda</title>
    <link rel="stylesheet" href="agenda.css">
    <link href="https://fonts.googleapis.com/css2?family=Righteous&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <div class="titulo"><h1>Black Bil</h1></div>
        <div class="logo"><img src="../../src/logo.jpg" alt="Logo Black Bil"></div>
        <button class="hamburger" id="hamburger" aria-label="Abrir menu">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <nav id="nav-menu">
            <ul>
                <li><a href="#" class="nav-ativo">Agenda</a></li>
                <li><a href="../servicos/servico.html">Serviços</a></li>
                <li><button class="nav-sair" id="btn-sair" type="button">Sair</button></li>
            </ul>
        </nav>
    </header>

    <div class="nav-data">
        <button class="btn-nav-dia" id="btn-dia-ant" type="button">‹</button>
        <div class="data-info">
            <span class="dia-semana" id="dia-semana"></span>
            <span class="data-completa" id="data-completa"></span>
        </div>
        <button class="btn-nav-dia" id="btn-dia-pro" type="button">›</button>
        <button class="btn-hoje" id="btn-hoje" type="button">Hoje</button>
    </div>

    <main class="container">

        <div class="resumo-dia" id="resumo-dia"></div>

        <div class="bloco-periodo">
            <h3 class="periodo-titulo">Manhã</h3>
            <div class="slots-lista" id="slots-manha"></div>
        </div>

        <div class="bloco-periodo">
            <h3 class="periodo-titulo">Tarde</h3>
            <div class="slots-lista" id="slots-tarde"></div>
        </div>

        <div class="bloco-periodo">
            <h3 class="periodo-titulo">Noite</h3>
            <div class="slots-lista" id="slots-noite"></div>
        </div>

    </main>

    <div class="modal-overlay escondido" id="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modal-titulo"></h3>
                <button class="modal-fechar" id="modal-fechar" aria-label="Fechar">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
            <div class="modal-body" id="modal-body"></div>
            <div class="modal-acoes" id="modal-acoes"></div>
        </div>
    </div>

    <script src="agenda.js"></script>
</body>
</html>
