<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black Bil — Acesso Funcionário</title>
    <link rel="stylesheet" href="login.css">
    <link href="https://fonts.googleapis.com/css2?family=Righteous&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <header class="header-mobile">
        <p class="header-marca">Black Bil</p>
        <p class="header-sub">Área restrita — Funcionários</p>
    </header>

    <main class="pagina-login">

        <div class="painel-esquerdo">
            <div class="foto-aviso">
                <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
                    <circle cx="12" cy="13" r="4"/>
                </svg>
                <img src="../../src/login/bil.jpeg" alt="">
            </div>
            <div class="painel-rodape">
                <p class="painel-slogan">Black Bil</p>
                <p class="painel-sub">Área restrita — Funcionários</p>
            </div>
        </div>

        <div class="painel-direito">
            <div class="card-form">

                <div class="form-cabecalho">
                    <h2 class="form-titulo">Acesso restrito</h2>
                    <p class="form-subtitulo">Insira suas credenciais corporativas para continuar</p>
                </div>

                <form id="form-login">

                    <div class="input-grupo">
                        <span class="input-icone">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="2" y="4" width="20" height="16" rx="2"/>
                                <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
                            </svg>
                        </span>
                        <input type="email" id="input-email" placeholder="Email corporativo" required autocomplete="email">
                    </div>

                    <div class="input-grupo">
                        <span class="input-icone">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                            </svg>
                        </span>
                        <input type="password" id="input-senha" placeholder="Senha" required autocomplete="current-password">
                        <button type="button" class="btn-olho" data-target="input-senha" aria-label="Mostrar senha">
                            <svg class="olho-aberto" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                            <svg class="olho-fechado escondido" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                                <line x1="1" y1="1" x2="23" y2="23"/>
                            </svg>
                        </button>
                    </div>

                    <p class="erro-login escondido" id="erro-login">Email ou senha incorretos.</p>

                    <button type="submit" class="btn-principal">Entrar</button>

                </form>

                <p class="rodape-form">
                    Não tem acesso? Fale com o administrador.
                </p>

            </div>
        </div>

    </main>

    <script src="login.js"></script>
</body>
</html>
