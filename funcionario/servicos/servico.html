<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black Bil — Serviços</title>
    <link rel="stylesheet" href="servico.css">
    <link href="https://fonts.googleapis.com/css2?family=Righteous&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <div class="titulo"><h1>Black Bil</h1></div>
        <div class="logo"><img src="../../src/logo.jpg" alt="Logo Black Bil"></div>
        <button class="hamburger" id="hamburger" aria-label="Abrir menu">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <nav id="nav-menu">
            <ul>
                <li><a href="../agenda/agenda.html">Agenda</a></li>
                <li><a href="#" class="nav-ativo">Serviços</a></li>
                <li><button class="nav-sair" id="btn-sair" type="button">Sair</button></li>
            </ul>
        </nav>
    </header>

    <main class="container">

        <div class="page-header">
            <h2 class="page-titulo">Gerenciar Serviços</h2>
            <button class="btn-adicionar" id="btn-adicionar">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
                Novo serviço
            </button>
        </div>

        <div class="tabs-wrapper">
            <div class="categorias-tabs" id="categorias-tabs"></div>
            <button class="btn-nova-categoria" id="btn-nova-categoria" title="Adicionar tipo de serviço">
                <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
                Nova categoria
            </button>
        </div>

        <div class="servicos-lista" id="servicos-lista"></div>

        <div class="fotos-secao">
            <div class="fotos-secao-header">
                <h3 class="fotos-secao-titulo">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="2"/>
                        <circle cx="8.5" cy="8.5" r="1.5"/>
                        <polyline points="21 15 16 10 5 21"/>
                    </svg>
                    Fotos desta categoria
                </h3>
                <label class="btn-upload" for="input-foto" title="Aceita múltiplas fotos">
                    <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
                    </svg>
                    Adicionar foto
                    <input type="file" id="input-foto" accept="image/*" multiple style="display:none">
                </label>
            </div>
            <div class="fotos-gerenciar-grid" id="fotos-gerenciar-grid"></div>
        </div>

    </main>

    <!-- Modal adicionar / editar -->
    <div class="modal-overlay escondido" id="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modal-titulo">Novo Serviço</h3>
                <button class="modal-fechar" id="modal-fechar" aria-label="Fechar">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
            <form id="form-servico">
                <div class="campo">
                    <label for="input-nome">Nome do serviço</label>
                    <input type="text" id="input-nome" placeholder="Ex: Corte simples" required>
                </div>
                <div class="campo">
                    <label for="input-preco">Preço (R$)</label>
                    <input type="number" id="input-preco" placeholder="0,00" min="0" step="0.01" required>
                </div>
                <div class="campo">
                    <label for="input-duracao">Duração</label>
                    <select id="input-duracao" required>
                        <option value="30">30 min</option>
                        <option value="45">45 min</option>
                        <option value="60">1 hora</option>
                        <option value="90">1h 30min</option>
                        <option value="120">2 horas</option>
                        <option value="150">2h 30min</option>
                        <option value="180">3 horas</option>
                    </select>
                </div>
                <div class="campo campo-checkbox">
                    <label class="label-check">
                        <input type="checkbox" id="input-apartirde">
                        <span>Exibir como "a partir de"</span>
                    </label>
                </div>
                <div class="modal-acoes">
                    <button type="button" class="btn-cancelar" id="btn-cancelar">Cancelar</button>
                    <button type="submit" class="btn-salvar">Salvar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal nova categoria -->
    <div class="modal-overlay escondido" id="modal-categoria-overlay">
        <div class="modal">
            <div class="modal-header">
                <h3>Nova Categoria</h3>
                <button class="modal-fechar" id="modal-cat-fechar" aria-label="Fechar">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
            <form id="form-categoria">
                <div class="campo">
                    <label for="input-cat-nome">Nome da categoria</label>
                    <input type="text" id="input-cat-nome" placeholder="Ex: Tranças" required>
                </div>
                <div class="modal-acoes">
                    <button type="button" class="btn-cancelar" id="btn-cat-cancelar">Cancelar</button>
                    <button type="submit" class="btn-salvar">Criar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="servico.js"></script>
</body>
</html>
